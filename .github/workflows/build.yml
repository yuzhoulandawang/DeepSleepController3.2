name: 🔍 Smart Diagnostic Build (No Auto-Fix)

on:
  workflow_dispatch:

jobs:
  diagnose-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ========== 诊断阶段 ==========
      - name: 📋 Collect environment info
        run: |
          echo "### System Info" >> $GITHUB_STEP_SUMMARY
          echo "- Java: $(java -version 2>&1 | head -1)" >> $GITHUB_STEP_SUMMARY
          echo "- Gradle Wrapper version: $(./gradlew --version | grep "Gradle ")" >> $GITHUB_STEP_SUMMARY
          echo "- Kotlin: $(./gradlew --version | grep "Kotlin:")" >> $GITHUB_STEP_SUMMARY

      - name: 📁 Check project structure
        run: |
          echo "### Project Structure" >> $GITHUB_STEP_SUMMARY
          tree -L 2 -I '.git|build' | head -20 >> $GITHUB_STEP_SUMMARY
          echo "... (truncated)" >> $GITHUB_STEP_SUMMARY

      - name: 🔧 Check configuration files
        run: |
          echo "### Gradle Wrapper Properties" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat gradle/wrapper/gradle-wrapper.properties 2>/dev/null || echo "Not found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "### Root build.gradle.kts" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -30 build.gradle.kts 2>/dev/null || echo "Not found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "### Settings.gradle.kts" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat settings.gradle.kts 2>/dev/null || echo "Not found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: 🔄 Check AGP & Kotlin compatibility
        run: |
          echo "### Plugin Compatibility" >> $GITHUB_STEP_SUMMARY
          AGP_VERSION=$(grep -E "com.android.application.*version" build.gradle.kts | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || echo "unknown")
          KOTLIN_VERSION=$(grep -E "org.jetbrains.kotlin.android.*version" build.gradle.kts | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || echo "unknown")
          echo "- AGP version: $AGP_VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- Kotlin plugin version: $KOTLIN_VERSION" >> $GITHUB_STEP_SUMMARY
          if [[ "$AGP_VERSION" != "unknown" && "$KOTLIN_VERSION" != "unknown" ]]; then
            # 这里可以添加简单的兼容性检查，比如 AGP 8.x 需要 Kotlin 1.9+
            AGP_MAJOR=${AGP_VERSION%%.*}
            KOTLIN_MAJOR=${KOTLIN_VERSION%%.*}
            if [[ $AGP_MAJOR -ge 8 && $KOTLIN_MAJOR -lt 9 ]]; then
              echo "⚠️ AGP 8+ may require Kotlin 1.9+ (current $KOTLIN_VERSION)" >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: 🧪 Run lint (full analysis)
        run: |
          ./gradlew lint --stacktrace > lint.log 2>&1 || true
          echo "### Lint Results" >> $GITHUB_STEP_SUMMARY
          grep -E "Found .* issues|warnings|errors" lint.log | tail -5 >> $GITHUB_STEP_SUMMARY || echo "No summary" >> $GITHUB_STEP_SUMMARY

      - name: 🧪 Run unit tests
        run: |
          ./gradlew testDebugUnitTest --stacktrace > test.log 2>&1 || true
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          tail -20 test.log | grep -E "tests|failures|errors|skipped" >> $GITHUB_STEP_SUMMARY || echo "No test results" >> $GITHUB_STEP_SUMMARY

      - name: 🔍 Check dependency tree (for conflicts)
        run: |
          ./gradlew app:dependencies > dependencies.txt 2>&1 || true
          echo "### Dependency Insights" >> $GITHUB_STEP_SUMMARY
          grep -E "->|(*)" dependencies.txt | head -20 >> $GITHUB_STEP_SUMMARY || echo "No conflicts" >> $GITHUB_STEP_SUMMARY

      - name: 📦 Verify Android SDK components
        run: |
          echo "### Installed SDK Platforms" >> $GITHUB_STEP_SUMMARY
          sdkmanager --list | grep -E "platforms;android-" | tail -5 >> $GITHUB_STEP_SUMMARY

      # ========== 构建阶段（捕获完整日志） ==========
      - name: 🏗️ Build Debug APK (with scan)
        run: |
          ./gradlew assembleDebug --stacktrace --scan 2>&1 | tee build.log
        continue-on-error: true

      # ========== 生成最终报告 ==========
      - name: 📊 Generate final report
        if: always()
        run: |
          echo "# 📋 Build Diagnostic Report" > final-report.md
          echo "" >> final-report.md
          echo "## 🔍 Summary" >> final-report.md
          if [ -f build.log ]; then
            if grep -q "BUILD SUCCESSFUL" build.log; then
              echo "✅ **Build succeeded**" >> final-report.md
            else
              echo "❌ **Build failed**" >> final-report.md
              echo "" >> final-report.md
              echo "### First 20 errors" >> final-report.md
              echo '```' >> final-report.md
              grep -E "^e:|^error:|FAILURE:|Unresolved reference|Suspend function" build.log | head -20 >> final-report.md
              echo '```' >> final-report.md
            fi
          else
            echo "⚠️ Build log not found" >> final-report.md
          fi

          echo "" >> final-report.md
          echo "### Suggested next steps" >> final-report.md
          echo "- Check lint report in artifacts for code issues." >> final-report.md
          echo "- Review dependency tree for conflicts." >> final-report.md
          echo "- Verify Kotlin/AGP compatibility." >> final-report.md
          echo "- Look for missing resources or theme definitions." >> final-report.md

      # ========== 上传所有产物 ==========
      - name: 📤 Upload diagnostic artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostic-reports
          path: |
            build.log
            lint.log
            test.log
            dependencies.txt
            final-report.md
            app/build/reports/
          if-no-files-found: ignore

      - name: 📦 Upload APK (if built)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
