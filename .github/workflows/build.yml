name: 🔍 Smart Diagnostic Build with Error Categorization

on:
  workflow_dispatch:

jobs:
  diagnose-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ========== 彻底清理环境，确保无缓存残留 ==========
      - name: 🧹 Wipe Gradle caches and warm up Kotlin DSL
        run: |
          ./gradlew --stop
          rm -rf ~/.gradle/caches/
          ./gradlew help --stacktrace

      # ========== 诊断阶段 ==========
      - name: 📋 Collect environment info
        run: |
          echo "### System Info" >> $GITHUB_STEP_SUMMARY
          echo "- Java: $(java -version 2>&1 | head -1)" >> $GITHUB_STEP_SUMMARY
          echo "- Gradle Wrapper version: $(./gradlew --version | grep "Gradle ")" >> $GITHUB_STEP_SUMMARY
          echo "- Kotlin: $(./gradlew --version | grep "Kotlin:")" >> $GITHUB_STEP_SUMMARY

      - name: 🔍 Check Gradle & AGP compatibility
        run: |
          GRADLE_VERSION=$(grep distributionUrl gradle/wrapper/gradle-wrapper.properties | grep -oE 'gradle-[0-9.]+' | cut -d- -f2)
          AGP_VERSION=$(grep -E "com.android.application.*version" build.gradle.kts | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || echo "unknown")
          echo "### Compatibility Check" >> $GITHUB_STEP_SUMMARY
          echo "- Gradle version: $GRADLE_VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- AGP version: $AGP_VERSION" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ If you encounter issues, ensure Gradle and AGP versions are compatible." >> $GITHUB_STEP_SUMMARY

      - name: 📄 Show app/build.gradle.kts content (head)
        run: head -50 app/build.gradle.kts

      - name: 🔧 Ensure compileSdk in app/build.gradle.kts (optional)
        run: |
          if ! grep -q "compileSdk = 35" app/build.gradle.kts; then
            echo "⚠️ compileSdk not found. You may need to add 'compileSdk = 35' manually." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ compileSdk found." >> $GITHUB_STEP_SUMMARY
          fi

      # ========== 刷新依赖（清理后无需重复） ==========
      - name: 🧹 Clean and refresh dependencies
        run: ./gradlew clean --refresh-dependencies

      # ========== 诊断：确认 JavaPoet 版本 ==========
      - name: 🔎 Verify JavaPoet version
        run: |
          echo "### JavaPoet version (debug compile classpath)" >> $GITHUB_STEP_SUMMARY
          ./gradlew -q app:dependencies --configuration debugCompileClasspath | grep javapoet | head -5 >> $GITHUB_STEP_SUMMARY || echo "Not found" >> $GITHUB_STEP_SUMMARY

      # ========== 首次构建尝试 ==========
      - name: 🏗️ First build attempt
        id: first_build
        run: |
          ./gradlew assembleDebug --stacktrace 2>&1 | tee build.log
        continue-on-error: true

      # ========== 检测是否需要自动修复（Hilt/JavaPoet 冲突） ==========
      - name: 🔎 Check if Hilt/JavaPoet conflict fix is needed
        id: check_fix
        run: |
          if grep -q "java.lang.NoSuchMethodError.*javapoet\|com.squareup.javapoet.ClassName.canonicalName" build.log; then
            echo "need_fix=true" >> $GITHUB_OUTPUT
          else
            echo "need_fix=false" >> $GITHUB_OUTPUT
          fi

      # ========== 智能错误处理：强制清理缓存并重试（您已手动添加 resolutionStrategy，无需修改文件） ==========
      - name: 🛠️ Auto-fix for Hilt/JavaPoet conflict
        if: steps.check_fix.outputs.need_fix == 'true'
        run: |
          echo "Detected Hilt/JavaPoet conflict. Forcing cache cleanup and retry..."
          ./gradlew --stop
          rm -rf ~/.gradle/caches/
          ./gradlew clean assembleDebug --stacktrace 2>&1 | tee build_fixed.log
          cp build_fixed.log build.log
        continue-on-error: true

      # ========== 输出 JavaPoet 的详细依赖信息（诊断用） ==========
      - name: 🔍 Debug JavaPoet version (dependency insight)
        if: always()
        run: |
          echo "### JavaPoet version insight" >> $GITHUB_STEP_SUMMARY
          ./gradlew app:dependencyInsight --dependency javapoet --configuration debugCompileClasspath >> $GITHUB_STEP_SUMMARY || true

      # ========== 分类错误报告（基于最终的 build.log） ==========
      - name: 📊 Generate categorized error report
        if: always()
        run: |
          echo "# 📋 Build Diagnostic Report (Categorized)" > final-report.md
          echo "" >> final-report.md
          echo "## 🔍 Summary" >> final-report.md
          if [ -f build.log ]; then
            if grep -q "BUILD SUCCESSFUL" build.log; then
              echo "✅ **Build succeeded**" >> final-report.md
            else
              echo "❌ **Build failed**" >> final-report.md
              echo "" >> final-report.md
              echo "### 📊 Error Categories" >> final-report.md
              
              declare -A error_patterns=(
                ["KSP/Kotlin版本不兼容"]="ksp.*is too new for kotlin"
                ["挂起函数调用错误"]="Suspend function.*should be called only from a coroutine"
                ["未解决的引用"]="Unresolved reference"
                ["类型不匹配"]="type mismatch"
                ["参数不匹配"]="No value passed for parameter|Cannot find a parameter"
                ["函数重载冲突"]="Conflicting overloads"
                ["缺少导入"]="Unresolved reference.*(import|kotlinx)"
                ["Compose上下文错误"]="@Composable invocations can only happen from the context of a @Composable function"
                ["资源缺失"]="resource.*not found"
                ["依赖冲突"]="Conflict|dependency convergence"
                ["Hilt/JavaPoet冲突"]="java.lang.NoSuchMethodError.*javapoet|com.squareup.javapoet.ClassName.canonicalName"
                ["其他错误"]="^e:|^error:|FAILURE:"
              )
              
              for category in "${!error_patterns[@]}"; do
                pattern="${error_patterns[$category]}"
                count=$(grep -E "$pattern" build.log | wc -l)
                if [ "$count" -gt 0 ]; then
                  echo "- **$category**: $count occurrences" >> final-report.md
                  echo '  ```' >> final-report.md
                  grep -E "$pattern" build.log | head -3 | sed 's/^/  /' >> final-report.md
                  if [ "$count" -gt 3 ]; then
                    echo "  ... (and $((count-3)) more)" >> final-report.md
                  fi
                  echo '  ```' >> final-report.md
                fi
              done
              
              echo "" >> final-report.md
              echo "### 📄 Full Log" >> final-report.md
              echo "Download \`build.log\` artifact for complete details." >> final-report.md
            fi
          else
            echo "⚠️ Build log not found" >> final-report.md
          fi
          
          echo "" >> final-report.md
          echo "## 🖥️ Environment" >> final-report.md
          echo "- Java: $(java -version 2>&1 | head -1)" >> final-report.md
          echo "- Gradle: $(./gradlew --version | grep "Gradle ")" >> final-report.md
          echo "- Kotlin: $(./gradlew --version | grep "Kotlin:")" >> final-report.md

      # ========== 上传所有产物 ==========
      - name: 📤 Upload diagnostic artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostic-reports
          path: |
            build.log
            build_fixed.log
            final-report.md
            app/build/reports/
          if-no-files-found: ignore

      - name: 📦 Upload APK (if built)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk