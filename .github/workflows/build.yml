name: 🔍 Smart Diagnostic Build with Error Categorization

on:
  workflow_dispatch:

jobs:
  diagnose-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ========== 诊断阶段 ==========
      - name: 📋 Collect environment info
        run: |
          echo "### System Info" >> $GITHUB_STEP_SUMMARY
          echo "- Java: $(java -version 2>&1 | head -1)" >> $GITHUB_STEP_SUMMARY
          echo "- Gradle Wrapper version: $(./gradlew --version | grep "Gradle ")" >> $GITHUB_STEP_SUMMARY
          echo "- Kotlin: $(./gradlew --version | grep "Kotlin:")" >> $GITHUB_STEP_SUMMARY

      - name: 📁 Check project structure
        run: |
          echo "### Project Structure" >> $GITHUB_STEP_SUMMARY
          tree -L 2 -I '.git|build' | head -20 >> $GITHUB_STEP_SUMMARY
          echo "... (truncated)" >> $GITHUB_STEP_SUMMARY

      - name: 🔧 Check configuration files
        run: |
          echo "### Gradle Wrapper Properties" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat gradle/wrapper/gradle-wrapper.properties 2>/dev/null || echo "Not found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "### Root build.gradle.kts" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -30 build.gradle.kts 2>/dev/null || echo "Not found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "### Settings.gradle.kts" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat settings.gradle.kts 2>/dev/null || echo "Not found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: 🔄 Check AGP & Kotlin compatibility
        run: |
          echo "### Plugin Compatibility" >> $GITHUB_STEP_SUMMARY
          AGP_VERSION=$(grep -E "com.android.application.*version" build.gradle.kts | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || echo "unknown")
          KOTLIN_VERSION=$(grep -E "org.jetbrains.kotlin.android.*version" build.gradle.kts | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || echo "unknown")
          echo "- AGP version: $AGP_VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- Kotlin plugin version: $KOTLIN_VERSION" >> $GITHUB_STEP_SUMMARY
          if [[ "$AGP_VERSION" != "unknown" && "$KOTLIN_VERSION" != "unknown" ]]; then
            AGP_MAJOR=${AGP_VERSION%%.*}
            KOTLIN_MAJOR=${KOTLIN_VERSION%%.*}
            if [[ $AGP_MAJOR -ge 8 && $KOTLIN_MAJOR -lt 9 ]]; then
              echo "⚠️ AGP 8+ may require Kotlin 1.9+ (current $KOTLIN_VERSION)" >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: 🧪 Run lint (full analysis)
        run: |
          ./gradlew lint --stacktrace > lint.log 2>&1 || true
          echo "### Lint Results" >> $GITHUB_STEP_SUMMARY
          grep -E "Found .* issues|warnings|errors" lint.log | tail -5 >> $GITHUB_STEP_SUMMARY || echo "No summary" >> $GITHUB_STEP_SUMMARY

      - name: 🧪 Run unit tests
        run: |
          ./gradlew testDebugUnitTest --stacktrace > test.log 2>&1 || true
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          tail -20 test.log | grep -E "tests|failures|errors|skipped" >> $GITHUB_STEP_SUMMARY || echo "No test results" >> $GITHUB_STEP_SUMMARY

      - name: 🔍 Check dependency tree (for conflicts)
        run: |
          ./gradlew app:dependencies > dependencies.txt 2>&1 || true
          echo "### Dependency Insights" >> $GITHUB_STEP_SUMMARY
          grep -E "->|(*)" dependencies.txt | head -20 >> $GITHUB_STEP_SUMMARY || echo "No conflicts" >> $GITHUB_STEP_SUMMARY

      - name: 📦 Verify Android SDK components
        run: |
          echo "### Installed SDK Platforms" >> $GITHUB_STEP_SUMMARY
          sdkmanager --list | grep -E "platforms;android-" | tail -5 >> $GITHUB_STEP_SUMMARY

      # ========== 清理缓存并刷新依赖 ==========
      - name: 🧹 Clean project and refresh dependencies
        run: |
          ./gradlew clean
          ./gradlew --refresh-dependencies

      # ========== 诊断：确认 JavaPoet 版本 ==========
      - name: 🔎 Verify JavaPoet version
        run: |
          echo "### JavaPoet version (debug compile classpath)" >> $GITHUB_STEP_SUMMARY
          ./gradlew -q app:dependencies --configuration debugCompileClasspath | grep javapoet | head -5 >> $GITHUB_STEP_SUMMARY || echo "Not found" >> $GITHUB_STEP_SUMMARY

      # ========== 首次构建尝试 ==========
      - name: 🏗️ First build attempt
        id: first_build
        run: |
          ./gradlew assembleDebug --stacktrace --scan --refresh-dependencies 2>&1 | tee build.log
        continue-on-error: true

      # ========== 智能错误处理：如果失败且是 JavaPoet 问题，尝试修复并重试 ==========
      - name: 🛠️ Auto-fix for Hilt/JavaPoet conflict
        if: steps.first_build.outcome == 'failure' && (contains(steps.first_build.outputs.stdout, 'java.lang.NoSuchMethodError') || contains(steps.first_build.outputs.stdout, 'com.squareup.javapoet.ClassName.canonicalName'))
        run: |
          echo "Detected Hilt/JavaPoet conflict. Attempting to upgrade Hilt version to 2.53.1 and Room to 2.7.0..."
          # 备份原始文件
          cp app/build.gradle.kts app/build.gradle.kts.bak
          # 升级 Hilt 和 Room 版本（简单替换，可能需要更精确的匹配）
          sed -i 's/id("com.google.dagger.hilt.android") version "[0-9.]*"/id("com.google.dagger.hilt.android") version "2.53.1"/' app/build.gradle.kts
          sed -i 's/implementation("com.google.dagger:hilt-android:[0-9.]*")/implementation("com.google.dagger:hilt-android:2.53.1")/' app/build.gradle.kts
          sed -i 's/ksp("com.google.dagger:hilt-compiler:[0-9.]*")/ksp("com.google.dagger:hilt-compiler:2.53.1")/' app/build.gradle.kts
          sed -i 's/implementation("androidx.room:room-runtime:[0-9.]*")/implementation("androidx.room:room-runtime:2.7.0")/' app/build.gradle.kts
          sed -i 's/implementation("androidx.room:room-ktx:[0-9.]*")/implementation("androidx.room:room-ktx:2.7.0")/' app/build.gradle.kts
          sed -i 's/ksp("androidx.room:room-compiler:[0-9.]*")/ksp("androidx.room:room-compiler:2.7.0")/' app/build.gradle.kts
          # 再次清理并构建
          ./gradlew clean assembleDebug --stacktrace --scan 2>&1 | tee build.log
        continue-on-error: true

      # ========== 分类错误报告（基于最终 build.log） ==========
      - name: 📊 Generate categorized error report
        if: always()
        run: |
          echo "# 📋 Build Diagnostic Report (Categorized)" > final-report.md
          echo "" >> final-report.md
          echo "## 🔍 Summary" >> final-report.md
          if [ -f build.log ]; then
            if grep -q "BUILD SUCCESSFUL" build.log; then
              echo "✅ **Build succeeded**" >> final-report.md
            else
              echo "❌ **Build failed**" >> final-report.md
              echo "" >> final-report.md
              echo "### 📊 Error Categories" >> final-report.md
              
              # 定义各种错误类型的 grep 模式
              declare -A error_patterns=(
                ["KSP/Kotlin版本不兼容"]="ksp.*is too new for kotlin"
                ["挂起函数调用错误"]="Suspend function.*should be called only from a coroutine"
                ["未解决的引用"]="Unresolved reference"
                ["类型不匹配"]="type mismatch"
                ["参数不匹配"]="No value passed for parameter|Cannot find a parameter"
                ["函数重载冲突"]="Conflicting overloads"
                ["缺少导入"]="Unresolved reference.*(import|kotlinx)"
                ["Compose上下文错误"]="@Composable invocations can only happen from the context of a @Composable function"
                ["资源缺失"]="resource.*not found"
                ["依赖冲突"]="Conflict|dependency convergence"
                ["Hilt/JavaPoet冲突"]="java.lang.NoSuchMethodError.*javapoet|com.squareup.javapoet.ClassName.canonicalName"
                ["其他错误"]="^e:|^error:|FAILURE:"
              )
              
              for category in "${!error_patterns[@]}"; do
                pattern="${error_patterns[$category]}"
                count=$(grep -E "$pattern" build.log | wc -l)
                if [ "$count" -gt 0 ]; then
                  echo "- **$category**: $count occurrences" >> final-report.md
                  echo '  ```' >> final-report.md
                  grep -E "$pattern" build.log | head -3 | sed 's/^/  /' >> final-report.md
                  if [ "$count" -gt 3 ]; then
                    echo "  ... (and $((count-3)) more)" >> final-report.md
                  fi
                  echo '  ```' >> final-report.md
                fi
              done
              
              echo "" >> final-report.md
              echo "### 📄 Full Log" >> final-report.md
              echo "Download \`build.log\` artifact for complete details." >> final-report.md
            fi
          else
            echo "⚠️ Build log not found" >> final-report.md
          fi
          
          # 附加环境信息（可选）
          echo "" >> final-report.md
          echo "## 🖥️ Environment" >> final-report.md
          echo "- Java: $(java -version 2>&1 | head -1)" >> final-report.md
          echo "- Gradle: $(./gradlew --version | grep "Gradle ")" >> final-report.md
          echo "- Kotlin: $(./gradlew --version | grep "Kotlin:")" >> final-report.md

      # ========== 上传所有产物 ==========
      - name: 📤 Upload diagnostic artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostic-reports
          path: |
            build.log
            lint.log
            test.log
            dependencies.txt
            final-report.md
            app/build/reports/
          if-no-files-found: ignore

      - name: 📦 Upload APK (if built)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk